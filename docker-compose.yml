version: '3.8'
services:
  app:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lexai
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
